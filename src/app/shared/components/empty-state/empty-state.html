<div class="flex flex-col items-center justify-center p-8 text-center bg-white rounded-2xl border border-gray-100 shadow-sm">
  <div class="w-16 h-16 mb-4 text-gray-400 bg-gray-50 rounded-full flex items-center justify-center">
    <svg *ngIf="!icon()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
    </svg>
    <!-- Use ng-content if an icon is provided via transclusion, or bind innerHTML if passed as string -->
    <div *ngIf="icon()" [innerHTML]="icon()"></div>
  </div>
  
  <h3 class="text-lg font-semibold text-gray-900 mb-1">{{ title() }}</h3>
  <p class="text-sm text-gray-500 mb-6 max-w-sm">{{ description() }}</p>
  
  <button *ngIf="actionText()" (click)="onAction()" class="btn-primary">
    {{ actionText() }}
  </button>
</div>
