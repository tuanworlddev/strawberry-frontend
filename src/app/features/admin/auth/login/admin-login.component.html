<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 mb-6">
                <div
                    class="w-10 h-10 rounded-xl bg-red-600 flex items-center justify-center text-white shadow-lg shadow-red-900/40">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <span class="text-2xl font-black text-white tracking-tight">Admin Console</span>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">Internal Access</h1>
            <p class="text-gray-400">Authorized personnel only</p>
        </div>

        <div class="bg-gray-800 rounded-3xl shadow-2xl p-8 border border-gray-700">
            <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest px-1">Identity</label>
                    <app-input formControlName="email" type="email" placeholder="admin@strawberry.com"
                        [error]="getError('email')" class="admin-input"></app-input>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest px-1">Security Key</label>
                    <app-input formControlName="password" type="password" placeholder="••••••••"
                        [error]="getError('password')" class="admin-input"></app-input>
                </div>

                @if (errorMessage()) {
                <div
                    class="p-4 rounded-2xl bg-red-950/50 border border-red-500/50 text-red-400 text-sm font-medium animate-in fade-in slide-in-from-top-2">
                    {{ errorMessage() }}
                </div>
                }

                <app-button type="submit" variant="primary" size="lg" class="w-full h-14 text-lg bg-red-600 hover:bg-red-700 border-none shadow-lg shadow-red-900/20" [loading]="loading()"
                    [disabled]="loading()">
                    Authenticate
                </app-button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a routerLink="/" class="text-gray-500 text-sm hover:text-gray-300 transition-colors">
                ← Return to Environment
            </a>
        </div>
    </div>
</div>
