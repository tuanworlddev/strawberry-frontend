<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="card p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
          style="background-color: var(--color-primary)">
          <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
        <p class="text-gray-500 mt-1">Sign in to your account</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <app-input formControlName="email" type="email" label="Email" placeholder="you@example.com" [error]="getError('email')"></app-input>
        <app-input formControlName="password" type="password" label="Password" placeholder="••••••••" [error]="getError('password')"></app-input>

        @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
          {{ error() }}
        </div>
        }

        <app-button type="submit" [fullWidth]="true" [disabled]="loading()" [loading]="loading()">
          Sign In
        </app-button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a routerLink="/register" class="font-semibold hover:underline" style="color: var(--color-primary)">
          Sign up free
        </a>
      </p>
    </div>
  </div>
</div>
